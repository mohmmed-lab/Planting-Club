<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>نادي غرس - تسجيل الدخول</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Tajawal', sans-serif;
  direction: rtl;
  min-height: 100vh;
  background: #0a1628;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Animated background */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(201,162,39,0.15);
  animation: floatParticle linear infinite;
}

.glow-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  animation: pulse 4s ease-in-out infinite;
}

.glow-orb-1 { width: 400px; height: 400px; background: rgba(201,162,39,0.08); top: -100px; right: -100px; }
.glow-orb-2 { width: 300px; height: 300px; background: rgba(13,31,60,0.6); bottom: -50px; left: -50px; animation-delay: 2s; }

/* Grid lines */
.grid-lines {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,162,39,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,162,39,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
}

/* Main container */
.login-wrapper {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 420px;
  padding: 20px;
  animation: slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

/* Logo Section */
.logo-section {
  text-align: center;
  margin-bottom: 28px;
  animation: slideDown 0.6s ease 0.1s both;
}

.logo-circle {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #c9a227, #a07d10);
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 14px;
  box-shadow: 0 10px 40px rgba(201,162,39,0.4), 0 0 0 8px rgba(201,162,39,0.1);
  animation: glow 2.5s ease-in-out infinite, float 3s ease-in-out infinite;
  font-size: 2.5rem;
  position: relative;
  overflow: hidden;
}

.logo-circle::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 60%);
  border-radius: inherit;
}

.club-name {
  font-size: 2.2rem;
  font-weight: 900;
  color: #c9a227;
  text-shadow: 0 0 30px rgba(201,162,39,0.5), 0 0 60px rgba(201,162,39,0.2);
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.club-subtitle {
  font-size: 0.82rem;
  color: rgba(255,255,255,0.5);
  font-weight: 400;
  letter-spacing: 1px;
}

/* Card */
.login-card { animation: loginCardIn 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards, glowPulse 3s ease-in-out 1s infinite;
  background: rgba(255,255,255,0.97);
  border-radius: 24px;
  padding: 32px 28px;
  box-shadow:
    0 30px 80px rgba(0,0,0,0.4),
    0 0 0 1px rgba(201,162,39,0.2),
    inset 0 1px 0 rgba(255,255,255,0.8);
  animation: slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  position: relative;
  overflow: hidden;
}

.login-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, #c9a227, #e8c84a, #c9a227);
  background-size: 200% 100%;
  animation: shimmer 2s linear infinite;
}

.card-title {
  font-size: 1.2rem;
  font-weight: 800;
  color: #0a1628;
  margin-bottom: 24px;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.card-title::before {
  content: '';
  width: 30px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #c9a227);
}
.card-title::after {
  content: '';
  width: 30px;
  height: 2px;
  background: linear-gradient(90deg, #c9a227, transparent);
}

/* Form */
.form-group { margin-bottom: 18px; position: relative; }

.form-label {
  display: block;
  font-size: 0.82rem;
  font-weight: 700;
  color: #0a1628;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.form-input {
  width: 100%;
  padding: 13px 16px 13px 46px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  font-family: 'Tajawal', sans-serif;
  font-size: 0.92rem;
  color: #0a1628;
  background: #f8fafc;
  transition: all 0.3s ease;
  outline: none;
  direction: rtl;
}

.form-input:focus {
  border-color: #c9a227;
  background: #fff;
  box-shadow: 0 0 0 4px rgba(201,162,39,0.15), 0 4px 12px rgba(201,162,39,0.1);
  transform: translateY(-1px);
}

.input-icon {
  position: absolute;
  left: 14px;
  bottom: 14px;
  font-size: 1rem;
  color: #8892a4;
  pointer-events: none;
  transition: color 0.3s ease;
}

.form-group:focus-within .input-icon { color: #c9a227; }

.pass-toggle {
  position: absolute;
  left: 44px;
  bottom: 12px;
  cursor: pointer;
  font-size: 0.85rem;
  color: #8892a4;
  background: none;
  border: none;
  padding: 4px;
  transition: color 0.2s;
}
.pass-toggle:hover { color: #c9a227; }

/* Login button */
.login-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #c9a227, #a07d10);
  color: #0a1628;
  border: none;
  border-radius: 12px;
  font-family: 'Tajawal', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 8px 25px rgba(201,162,39,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  position: relative;
  overflow: hidden;
  letter-spacing: 0.5px;
  margin-top: 8px;
}

.login-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.15);
  transform: translateX(-100%) skewX(-15deg);
  transition: transform 0.4s ease;
}

.login-btn:hover::before { transform: translateX(100%) skewX(-15deg); }

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 35px rgba(201,162,39,0.55);
}

.login-btn:active { transform: scale(0.98); }

.login-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

/* ─── Saved Accounts Section ─── */
.saved-accounts-section {
  margin-bottom: 16px;
  animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
}

.saved-accounts-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  padding: 0 2px;
}

.saved-accounts-title {
  font-size: 0.78rem;
  font-weight: 700;
  color: rgba(255,255,255,0.55);
  display: flex;
  align-items: center;
  gap: 6px;
  letter-spacing: 0.5px;
}

.saved-accounts-edit-btn {
  font-size: 0.72rem;
  font-weight: 700;
  color: rgba(201,162,39,0.7);
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Tajawal', sans-serif;
  padding: 3px 8px;
  border-radius: 6px;
  transition: all 0.2s ease;
}
.saved-accounts-edit-btn:hover {
  color: #c9a227;
  background: rgba(201,162,39,0.1);
}

.saved-accounts-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.saved-account-card {
  position: relative;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(201,162,39,0.18);
  border-radius: 14px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  gap: 9px;
  flex: 0 0 auto;
  width: auto;
  max-width: 100%;
  animation: fadeInScale 0.35s ease both;
  backdrop-filter: blur(4px);
}

.saved-account-card:hover {
  background: rgba(201,162,39,0.12);
  border-color: rgba(201,162,39,0.45);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(201,162,39,0.2);
}

.saved-account-card:active {
  transform: scale(0.96);
}

.saved-account-avatar {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  background: linear-gradient(135deg, #c9a227, #a07d10);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
  box-shadow: 0 3px 10px rgba(201,162,39,0.35);
}

.saved-account-info {
  flex: 1;
  min-width: 0;
}

.saved-account-name {
  font-size: 0.82rem;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
  white-space: normal;
  overflow: visible;
  word-break: break-word;
  line-height: 1.35;
}

.saved-account-role {
  font-size: 0.68rem;
  color: rgba(201,162,39,0.7);
  font-weight: 600;
  margin-top: 2px;
}

.saved-account-delete {
  position: absolute;
  top: -7px;
  left: -7px;
  width: 20px;
  height: 20px;
  background: #e53e3e;
  border: 2px solid #0a1628;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  color: #fff;
  cursor: pointer;
  z-index: 5;
  box-shadow: 0 2px 8px rgba(229,62,62,0.5);
  animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  line-height: 1;
  font-weight: 900;
  transition: transform 0.15s ease;
}
.saved-account-delete:hover {
  transform: scale(1.2);
}

.saved-accounts-section.edit-mode .saved-account-delete {
  display: flex;
}

.saved-accounts-section.edit-mode .saved-account-card {
  animation: wiggle 0.5s ease infinite alternate;
  cursor: default;
}

@keyframes wiggle {
  0%   { transform: rotate(-1.5deg); }
  100% { transform: rotate(1.5deg); }
}

@keyframes fadeInScale {
  from { opacity:0; transform: scale(0.8); }
  to   { opacity:1; transform: scale(1); }
}

@keyframes popIn {
  from { transform: scale(0); }
  to   { transform: scale(1); }
}

/* Error message */
.error-msg {
  background: #fff5f5;
  border: 1px solid rgba(229,62,62,0.3);
  border-radius: 10px;
  padding: 10px 14px;
  color: #c53030;
  font-size: 0.85rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  animation: shake 0.4s ease;
}

/* Loader in button */
.btn-loader {
  display: inline-block;
  position: relative;
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  vertical-align: middle;
}
.btn-loader::before,
.btn-loader::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  border-style: solid;
  border-color: transparent;
}
.btn-loader::before {
  inset: 0;
  border-width: 2.5px;
  border-top-color: #0a1628;
  border-right-color: rgba(10,22,40,0.35);
  animation: spin 0.85s linear infinite;
}
.btn-loader::after {
  inset: 4px;
  border-width: 1.5px;
  border-bottom-color: rgba(10,22,40,0.5);
  border-left-color: rgba(10,22,40,0.2);
  animation: spin 1.5s linear infinite reverse;
}

/* شريط التقدم العلوي */
#ghars-topbar {
  position: fixed; top: 0; left: 0;
  height: 3px; width: 0%;
  background: linear-gradient(90deg, #c9a227, #f0d060, #c9a227);
  background-size: 200% 100%;
  z-index: 9999999;
  border-radius: 0 3px 3px 0;
  box-shadow: 0 0 10px rgba(201,162,39,0.8), 0 0 25px rgba(201,162,39,0.3);
  transition: width 0.25s ease;
  animation: topbarShimmer 1.4s linear infinite;
  pointer-events: none;
}
#ghars-topbar.done {
  width: 100% !important;
  transition: width 0.2s ease, opacity 0.4s ease 0.15s;
  opacity: 0;
}
@keyframes topbarShimmer {
  0%   { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

/* شاشة انتقال الدخول */
#ghars-redirect-overlay {
  position: fixed; inset: 0; z-index: 9999998;
  background: #0a1628;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 28px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
}
#ghars-redirect-overlay.show {
  opacity: 1; pointer-events: all;
}
#ghars-redirect-overlay .gr-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(201,162,39,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,162,39,0.04) 1px, transparent 1px);
  background-size: 55px 55px;
}
#ghars-redirect-overlay .gr-orb {
  position: absolute; border-radius: 50%; filter: blur(80px);
}
#ghars-redirect-overlay .gr-orb-1 {
  width: 320px; height: 320px;
  background: rgba(201,162,39,0.1);
  top: -80px; right: -80px;
  animation: glOrb 5s ease-in-out infinite alternate;
}
#ghars-redirect-overlay .gr-orb-2 {
  width: 260px; height: 260px;
  background: rgba(13,31,60,0.7);
  bottom: -60px; left: -60px;
  animation: glOrb 5s ease-in-out 2.5s infinite alternate;
}
#ghars-redirect-overlay .gr-content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; gap: 24px;
}
#ghars-redirect-overlay .gr-ring-wrap {
  position: relative; width: 100px; height: 100px;
  display: flex; align-items: center; justify-content: center;
}
#ghars-redirect-overlay .gr-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 2.5px solid transparent;
  border-top-color: #c9a227;
  border-right-color: rgba(201,162,39,0.4);
  animation: spin 1.1s linear infinite;
}
#ghars-redirect-overlay .gr-ring-inner {
  position: absolute; inset: 8px;
  border-radius: 50%;
  border: 1.5px solid transparent;
  border-bottom-color: rgba(201,162,39,0.5);
  border-left-color: rgba(201,162,39,0.2);
  animation: spin 1.8s linear infinite reverse;
}
#ghars-redirect-overlay .gr-logo {
  width: 66px; height: 66px;
  background: linear-gradient(135deg, #c9a227, #a07d10);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.9rem;
  box-shadow: 0 0 0 6px rgba(201,162,39,0.12), 0 8px 28px rgba(201,162,39,0.4);
  animation: glLogoPulse 2.5s ease-in-out infinite;
  position: relative; overflow: hidden;
}
#ghars-redirect-overlay .gr-logo::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.28) 0%, transparent 55%);
  border-radius: inherit;
}
#ghars-redirect-overlay .gr-title {
  font-family: 'Tajawal', sans-serif;
  font-size: 2.4rem; font-weight: 900;
  color: #c9a227; letter-spacing: 4px; text-align: center;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
#ghars-redirect-overlay .gr-title-inner {
  display: flex; align-items: center; gap: 12px;
  animation: glMeetGlow 1.2s ease 1.35s both;
}
#ghars-redirect-overlay .gr-word-r {
  display: inline-block;
  animation: glFromRight 0.9s cubic-bezier(0.22,1,0.36,1) 0.5s both;
}
#ghars-redirect-overlay .gr-word-l {
  display: inline-block;
  animation: glFromLeft 0.9s cubic-bezier(0.22,1,0.36,1) 0.5s both;
}
#ghars-redirect-overlay .gr-sep {
  display: inline-block; width: 6px; height: 6px;
  background: #c9a227; border-radius: 50%;
  opacity: 0; transform: scale(0);
  animation: glSepPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.38s both;
}
#ghars-redirect-overlay .gr-title-line {
  position: absolute; bottom: -8px; left: 50%;
  transform: translateX(-50%) scaleX(0);
  width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, #c9a227, rgba(248,212,70,0.9), #c9a227, transparent);
  border-radius: 2px;
  animation: glLineExpand 0.6s ease 1.5s both;
  filter: blur(0.5px);
}
#ghars-redirect-overlay .gr-msg {
  font-family: 'Tajawal', sans-serif;
  font-size: 0.88rem; color: rgba(255,255,255,0.5);
  font-weight: 600; letter-spacing: 1px;
}
#ghars-redirect-overlay .gr-bar-wrap {
  width: 180px; height: 3px;
  background: rgba(201,162,39,0.15); border-radius: 10px; overflow: hidden;
}
#ghars-redirect-overlay .gr-bar {
  height: 100%;
  background: linear-gradient(90deg, #c9a227, #e8c84a, #c9a227);
  background-size: 200% 100%; border-radius: 10px;
  animation: glBarMove 1.8s ease-in-out infinite;
}
@keyframes glFromRight {
  0%   { transform: translateX(160px); opacity: 0; filter: blur(8px); }
  50%  { opacity: 1; filter: blur(1px); }
  75%  { transform: translateX(-6px); filter: blur(0); }
  88%  { transform: translateX(4px); }
  100% { transform: translateX(0); opacity: 1; filter: blur(0); }
}
@keyframes glFromLeft {
  0%   { transform: translateX(-160px); opacity: 0; filter: blur(8px); }
  50%  { opacity: 1; filter: blur(1px); }
  75%  { transform: translateX(6px); filter: blur(0); }
  88%  { transform: translateX(-4px); }
  100% { transform: translateX(0); opacity: 1; filter: blur(0); }
}
@keyframes glMeetGlow {
  0%   { text-shadow: 0 0 20px rgba(201,162,39,0.5); }
  30%  { text-shadow: 0 0 60px rgba(201,162,39,1), 0 0 100px rgba(201,162,39,0.7), 0 0 160px rgba(201,162,39,0.4); filter: brightness(1.3); }
  100% { text-shadow: 0 0 25px rgba(201,162,39,0.7), 0 0 55px rgba(201,162,39,0.3); filter: brightness(1); }
}
@keyframes glSepPop {
  0%   { opacity: 0; transform: scale(0); }
  60%  { opacity: 1; transform: scale(1.6); box-shadow: 0 0 20px rgba(201,162,39,1); }
  100% { opacity: 1; transform: scale(1); box-shadow: 0 0 8px rgba(201,162,39,0.8); }
}
@keyframes glLineExpand {
  0%   { transform: translateX(-50%) scaleX(0); opacity: 0; }
  60%  { opacity: 1; }
  100% { transform: translateX(-50%) scaleX(1); opacity: 1; }
}
@keyframes glOrb {
  from { transform: scale(1) translate(0,0); }
  to   { transform: scale(1.15) translate(15px,-10px); }
}
@keyframes glLogoPulse {
  0%, 100% { box-shadow: 0 0 0 6px rgba(201,162,39,0.12), 0 8px 28px rgba(201,162,39,0.4); }
  50%       { box-shadow: 0 0 0 10px rgba(201,162,39,0.2), 0 8px 40px rgba(201,162,39,0.55); }
}
@keyframes glTitlePulse {
  0%, 100% { text-shadow: 0 0 20px rgba(201,162,39,0.6), 0 0 50px rgba(201,162,39,0.25); }
  50%       { text-shadow: 0 0 32px rgba(201,162,39,0.9), 0 0 70px rgba(201,162,39,0.45); }
}
@keyframes glBarMove {
  0%   { background-position: 0%   50%; transform: scaleX(0.3); transform-origin: right; }
  50%  { transform: scaleX(1);           transform-origin: right; background-position: 100% 50%; }
  51%  { transform-origin: left; }
  100% { transform: scaleX(0.3);         transform-origin: left;  background-position: 200% 50%; }
}

/* Footer */
.login-footer {
  text-align: center;
  margin-top: 20px;
  color: rgba(255,255,255,0.4);
  font-size: 0.75rem;
  animation: fadeIn 0.6s ease 0.4s both;
}

.login-footer .brand { color: #c9a227; font-weight: 700; }

/* Floating badges */
.floating-badge {
  position: fixed;
  background: rgba(201,162,39,0.1);
  border: 1px solid rgba(201,162,39,0.2);
  border-radius: 12px;
  padding: 6px 12px;
  color: rgba(201,162,39,0.7);
  font-size: 0.72rem;
  font-weight: 600;
  backdrop-filter: blur(10px);
  pointer-events: none;
  animation: floatBadge 5s ease-in-out infinite;
}

.floating-badge-1 { top: 15%; right: 8%; animation-delay: 0s; }
.floating-badge-2 { top: 25%; left: 8%; animation-delay: 1.5s; }
.floating-badge-3 { bottom: 20%; right: 10%; animation-delay: 3s; }

/* Animations */
@keyframes floatParticle {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.5; }
  100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
}

@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes pulse { 0%,100% { opacity:0.7; transform: scale(1); } 50% { opacity:1; transform: scale(1.05); } }
@keyframes glow { 0%,100% { box-shadow: 0 10px 40px rgba(201,162,39,0.4),0 0 0 8px rgba(201,162,39,0.1); } 50% { box-shadow: 0 10px 60px rgba(201,162,39,0.6),0 0 0 12px rgba(201,162,39,0.2); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes slideUp { from { opacity:0; transform: translateY(30px) scale(0.96); } to { opacity:1; transform: translateY(0) scale(1); } }
@keyframes slideDown { from { opacity:0; transform: translateY(-20px); } to { opacity:1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
@keyframes floatBadge { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

@media (max-width: 480px) {
  .login-wrapper { padding: 14px; }
  .login-card { padding: 24px 18px; border-radius: 20px; }
  .club-name { font-size: 1.8rem; }
  .logo-circle { width: 68px; height: 68px; font-size: 2rem; }
  .floating-badge { display: none; }
}

@keyframes loginCardIn {
  0% { opacity:0; transform:translateY(40px) scale(0.95); }
  60% { transform:translateY(-6px) scale(1.01); }
  100% { opacity:1; transform:translateY(0) scale(1); }
}
</style>
</head>
<body>

<!-- شريط التقدم العلوي -->
<div id="ghars-topbar"></div>

<!-- شاشة انتقال الدخول -->
<div id="ghars-redirect-overlay">

<div class="login-wrapper">
  <div class="logo-section">

    <div class="club-name">نادي غرس</div>
    <div class="club-subtitle">قيم تغرس وجيل يبنى</div>
  </div>

  <div id="savedAccountsSection" class="saved-accounts-section" style="display:none">

        <span>👤</span> اسم المستخدم

      <input type="text" id="username" class="form-input" placeholder="أدخل اسم المستخدم" autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false">

</div>

<div class="login-footer">
  جميع الحقوق محفوظة لـ <span class="brand">نادي غرس</span> © 2026
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="js/supabase-client.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // 1. تشغيل المؤثرات البصرية الخلفية
  const canvas = document.querySelector('.bg-canvas');
  if (canvas) {
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 6 + 2;
      p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*8}s;opacity:${Math.random()*0.5+0.1};`;
      canvas.appendChild(p);
    }
  }

  // 2. تهيئة المصادقة
  Auth.init();

  // 2b. عرض الحسابات المحفوظة
  _saRender();
  
  // 3. ربط أزرار الإدخال
  const pwdEl = document.getElementById('password');
  const usrEl = document.getElementById('username');
  if (pwdEl) pwdEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  if (usrEl) usrEl.addEventListener('keydown', e => { if (e.key === 'Enter') { if(pwdEl) pwdEl.focus(); } });

  const passToggle = document.getElementById('passToggle');
  if (passToggle) {
    passToggle.addEventListener('click', () => {
      if (pwdEl) {
        pwdEl.type = pwdEl.type === 'password' ? 'text' : 'password';
        passToggle.textContent = pwdEl.type === 'password' ? '👁' : '🙈';
      }
    });
  }

  // 4. استرجاع البيانات المحفوظة محلياً وإظهارها بوضوح
  try {
    const saved = JSON.parse(localStorage.getItem('ghars__saved_creds') || 'null');
    if(saved && saved.username) {
      if (usrEl) usrEl.value = saved.username;
      // كلمة المرور غير مخزنة محلياً للأمان — يرجى إعادة الإدخال
      const rm = document.getElementById('rememberMe');
      if (rm) rm.checked = true;
      // ── إظهار شارة "بيانات محفوظة" ──
      const savedBadge = document.createElement('div');
      savedBadge.style.cssText = 'display:flex;align-items:center;gap:7px;background:rgba(201,162,39,0.12);border:1px solid rgba(201,162,39,0.35);border-radius:10px;padding:7px 12px;margin-bottom:14px;font-size:0.8rem;font-weight:700;color:#a07d10;animation:fadeIn 0.4s ease';
      savedBadge.innerHTML = `<span>💾</span><span>تم استرجاع بياناتك — <strong style="color:#c9a227">${saved.username}</strong></span>`;
      const cardTitle = document.querySelector('.card-title');
      if (cardTitle && cardTitle.parentNode) {
        cardTitle.parentNode.insertBefore(savedBadge, cardTitle.nextSibling);
      }
    }
  } catch(e) {}

  // 5. فحص رمز الاستجابة السريعة QR أو التحقق من الجلسة الحالية
  const urlParams = new URLSearchParams(window.location.search);
  let qrData = urlParams.get('qr');
  if (qrData) {
     handleQRLogin(qrData);
  } else if (Auth.currentUser) {
     // ── عرض خيار "متابعة" أو "تسجيل دخول بحساب آخر" ──
     _showSessionChoice(Auth.currentUser);
  }
});


function _showSessionChoice(user) {
  const card = document.querySelector('.login-card');
  if (!card) { verifyAndRedirect(user); return; }
  const roleIcon  = user.role === 'student' ? '🎓' : '👨‍🏫';
  const roleLabel = user.role === 'admin' ? 'مدير' : user.role === 'teacher' ? 'معلم' : 'طالب';
  card.innerHTML = `
    <div style="text-align:center;padding:10px 0 16px">
      <div style="font-size:2.5rem;margin-bottom:10px">${roleIcon}</div>
      <div style="font-size:1rem;font-weight:900;color:#0a1628;margin-bottom:6px">مرحباً مجدداً!</div>
      <div style="font-size:0.82rem;color:#aaa;margin-bottom:2px;font-weight:600">${roleLabel}</div>
      <div style="font-size:0.85rem;color:#666;margin-bottom:20px">
        مسجّل دخولك كـ <strong style="color:#c9a227">${_escHtml(user.name || user.username)}</strong>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="login-btn" onclick="_continueSession()" style="margin-top:0">
          <span>متابعة</span><span>→</span>
        </button>
        <button onclick="_switchAccount()" style="background:none;border:1.5px solid #e2e8f0;border-radius:12px;padding:11px;font-family:Tajawal,sans-serif;font-size:0.88rem;font-weight:700;color:#666;cursor:pointer;width:100%">
          🔄 تسجيل دخول بحساب آخر
        </button>
      </div>
    </div>`;
  // أظهر قسم الحسابات المحفوظة إذا وُجدت
  _saRender();
}
function _continueSession() {
  if (Auth.currentUser) verifyAndRedirect(Auth.currentUser);
}
function _switchAccount() {
  try { localStorage.removeItem('ghars__session'); } catch(_) {}
  Auth.currentUser = null;

  // استعادة بطاقة تسجيل الدخول بشكل سلس بدون إعادة تحميل الصفحة
  const card = document.querySelector('.login-card');
  if (!card) { location.reload(); return; }

  card.style.opacity = '0';
  card.style.transform = 'scale(0.97)';
  card.style.transition = 'all 0.22s ease';

  setTimeout(function() {
    card.innerHTML = `
      <div class="card-title">تسجيل الدخول</div>
      <div id="errorMsg" class="error-msg" style="display:none">
        <span>⚠️</span><span id="errorText"></span>
      </div>
      <div class="form-group">
        <label class="form-label"><span>👤</span> اسم المستخدم</label>
        <input type="text" id="username" class="form-input" placeholder="أدخل اسم المستخدم" autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false">
        <span class="input-icon">@</span>
      </div>
      <div class="form-group">
        <label class="form-label"><span>🔒</span> كلمة المرور</label>
        <input type="password" id="password" class="form-input" placeholder="أدخل كلمة المرور" autocomplete="current-password">
        <span class="input-icon">🔑</span>
        <button type="button" class="pass-toggle" id="passToggle" title="إظهار/إخفاء">👁</button>
      </div>
      <input type="checkbox" id="rememberMe" checked style="display:none">
      <button class="login-btn" id="loginBtn" onclick="handleLogin()">
        <span>الدخول</span><span>🚀</span>
      </button>`;

    // إعادة ربط الأحداث
    const pwdEl = document.getElementById('password');
    const usrEl = document.getElementById('username');
    const passToggle = document.getElementById('passToggle');
    if (pwdEl) pwdEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleLogin(); });
    if (usrEl) usrEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') { if(pwdEl) pwdEl.focus(); } });
    if (passToggle) {
      passToggle.addEventListener('click', function() {
        if (pwdEl) {
          pwdEl.type = pwdEl.type === 'password' ? 'text' : 'password';
          passToggle.textContent = pwdEl.type === 'password' ? '👁' : '🙈';
        }
      });
    }

    card.style.transition = 'all 0.28s ease';
    card.style.opacity = '1';
    card.style.transform = 'scale(1)';

    // عرض الحسابات المحفوظة إن وُجدت
    _saRender();
  }, 230);
}

async function handleQRLogin(qrData) {
  try {
    qrData = qrData.replace(/ /g, '+');
    let decoded = null;
    const methods = [
      () => JSON.parse(decodeURIComponent(escape(atob(qrData)))),
      () => JSON.parse(atob(qrData)),
      () => JSON.parse(decodeURIComponent(atob(qrData))),
      () => JSON.parse(decodeURIComponent(decodeURIComponent(escape(atob(qrData))))),
    ];
    for (const m of methods) {
      try { const d = m(); if (d && d.un && d.pw) { decoded = d; break; } } catch(_){}
    }
    
    if (!decoded || !decoded.un || !decoded.pw) {
      showError('رمز QR تالف — تواصل مع المعلم للحصول على رمز جديد.');
      window.history.replaceState({}, document.title, window.location.pathname);
      return;
    }

    const btn = document.getElementById('loginBtn');
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-loader" style="display:inline-block;vertical-align:middle;margin-left:6px"></span><span style="vertical-align:middle"> جاري التحقق...</span>';
    }
    
    // ── تسجيل الدخول مباشرة ──
    const result = await Auth.login(decoded.un, decoded.pw);
    
    if (result.ok) {
      showQRLoginSuccess(result.user, decoded.un, decoded.pw);
      _saAdd(result.user);
    } else {
      showError(result.msg || 'بيانات رمز QR غير صحيحة — تواصل مع المعلم.');
      if (btn) { btn.disabled = false; btn.innerHTML = '<span>الدخول</span><span>🚀</span>'; }
      const usrEl = document.getElementById('username');
      const pwdEl = document.getElementById('password');
      if (usrEl) usrEl.value = decoded.un;
      if (pwdEl) pwdEl.value = decoded.pw;
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  } catch(e) {
    console.error('QR login error:', e);
    showError('خطأ في قراءة رمز QR — حاول مسح الرمز مرة أخرى.');
    window.history.replaceState({}, document.title, window.location.pathname);
  }
}

// ═══════════════════════════════════════════════
//  SAVED ACCOUNTS MANAGER
// ═══════════════════════════════════════════════
var _SA_KEY = 'ghars__accounts_list';

function _saLoad() {
  try { return JSON.parse(localStorage.getItem(_SA_KEY) || '[]'); } catch(_) { return []; }
}

function _saSave(list) {
  try { localStorage.setItem(_SA_KEY, JSON.stringify(list)); } catch(_) {}
}

function _saAdd(user) {
  if (!user || !user.username) return;
  var list = _saLoad();
  // أزل إذا موجود مسبقاً (حتى لا يتكرر)
  list = list.filter(function(a) { return a.id !== user.id; });
  list.unshift({
    name:     user.name || user.username,
    username: user.username,
    password: user.password || '',
    id:       user.id,
    role:     user.role || 'student',
    savedAt:  new Date().toISOString()
  });
  // احتفظ بأحدث 8 حسابات فقط
  if (list.length > 8) list = list.slice(0, 8);
  _saSave(list);
}

function _saDelete(id) {
  // ابحث عن البطاقة المراد حذفها وطبّق عليها أنيميشن التلاشي
  var grid = document.getElementById('savedAccountsGrid');
  var card = grid ? grid.querySelector('[data-acc-id="' + id + '"]') : null;
  function _doDelete() {
    var list = _saLoad().filter(function(a) { return a.id !== id; });
    _saSave(list);
    _saRender();
    if (list.length === 0) {
      var sec = document.getElementById('savedAccountsSection');
      if (sec) sec.style.display = 'none';
      var editBtn = document.getElementById('editAccountsBtn');
      if (editBtn) editBtn.textContent = 'تعديل';
      if (sec) sec.classList.remove('edit-mode');
    }
  }
  if (card) {
    card.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
    card.style.opacity = '0';
    card.style.transform = 'scale(0.8)';
    setTimeout(_doDelete, 350);
  } else {
    _doDelete();
  }
}

function _toggleEditAccounts() {
  var sec = document.getElementById('savedAccountsSection');
  var btn = document.getElementById('editAccountsBtn');
  if (!sec || !btn) return;
  var isEdit = sec.classList.toggle('edit-mode');
  btn.textContent = isEdit ? 'تم' : 'تعديل';
}

function _saRender() {
  var list = _saLoad();
  var sec  = document.getElementById('savedAccountsSection');
  var grid = document.getElementById('savedAccountsGrid');
  if (!sec || !grid) return;

  if (list.length === 0) { sec.style.display = 'none'; return; }

  sec.style.display = 'block';
  grid.innerHTML = '';
  list.forEach(function(acc, idx) {
    var roleIcon  = (acc.role === 'teacher' || acc.role === 'admin') ? '👨‍🏫' : '🎓';
    var roleLabel = acc.role === 'admin' ? 'مدير' : acc.role === 'teacher' ? 'معلم' : 'طالب';
    var card = document.createElement('div');
    card.className = 'saved-account-card';
    card.dataset.accId = acc.id;
    card.setAttribute('data-acc-id', acc.id);
    card.style.animationDelay = (idx * 0.06) + 's';
    card.innerHTML =
      '<button class="saved-account-delete" onclick="event.stopPropagation();_saDelete(\'' + acc.id + '\')" title="حذف">✕</button>' +
      '<div class="saved-account-avatar">' + roleIcon + '</div>' +
      '<div class="saved-account-info">' +
        '<div class="saved-account-name">' + _escHtml(acc.name) + '</div>' +
        '<div class="saved-account-role">' + roleLabel + '</div>' +
      '</div>';
    card.addEventListener('click', function() {
      var sec2 = document.getElementById('savedAccountsSection');
      if (sec2 && sec2.classList.contains('edit-mode')) return;
      _saQuickLogin(acc);
    });
    grid.appendChild(card);
  });
}

async function _saQuickLogin(acc) {
  // ① إغلاق وضع التعديل
  var sec = document.getElementById('savedAccountsSection');
  if (sec) sec.classList.remove('edit-mode');
  var editBtn = document.getElementById('editAccountsBtn');
  if (editBtn) editBtn.textContent = 'تعديل';

  // ② إذا لا توجد كلمة مرور مخزنة → ملء الحقل يدوياً فقط
  if (!acc.password) {
    var usrEl = document.getElementById('username');
    var pwdEl = document.getElementById('password');
    if (usrEl) usrEl.value = acc.username;
    if (pwdEl) { pwdEl.value = ''; pwdEl.focus(); }
    return;
  }

  hideError();

  // ③ العثور على عنصر البطاقة المضغوطة بالـ id
  var clickedCard = document.querySelector('[data-acc-id="' + acc.id + '"]');
  var allCards    = document.querySelectorAll('.saved-account-card');

  // — أظهر حالة "جاري التحقق..." على البطاقة المضغوطة
  if (clickedCard) {
    clickedCard.dataset.origHtml = clickedCard.innerHTML;
    clickedCard.style.pointerEvents = 'none';
    clickedCard.style.borderColor   = 'rgba(201,162,39,0.6)';
    clickedCard.style.background    = 'rgba(201,162,39,0.1)';
    clickedCard.innerHTML =
      '<div style="display:flex;align-items:center;gap:8px;width:100%;justify-content:center;padding:4px 0">' +
        '<span class="btn-loader" style="display:inline-block;width:18px;height:18px;flex-shrink:0"></span>' +
        '<span style="font-size:0.78rem;font-weight:700;color:rgba(201,162,39,0.9)">جاري التحقق...</span>' +
      '</div>';
  }

  // — تعطيل بقية البطاقات وزر الدخول
  allCards.forEach(function(c) {
    if (c !== clickedCard) { c.style.opacity = '0.4'; c.style.pointerEvents = 'none'; }
  });
  var btn = document.getElementById('loginBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="btn-loader" style="display:inline-block;vertical-align:middle;margin-left:6px"></span><span style="vertical-align:middle"> جاري التحقق...</span>'; }

  // ④ دالة استعادة الحالة الطبيعية عند الخطأ المؤقت
  function _restoreAll() {
    allCards.forEach(function(c) { c.style.opacity = ''; c.style.pointerEvents = ''; });
    if (clickedCard && clickedCard.dataset.origHtml) {
      clickedCard.innerHTML       = clickedCard.dataset.origHtml;
      clickedCard.style.borderColor   = '';
      clickedCard.style.background    = '';
    }
    if (btn) { btn.disabled = false; btn.innerHTML = '<span>الدخول</span><span>🚀</span>'; }
  }

  // ⑤ دالة إزالة البطاقة بأنيماشن عند الحذف / تغيير البيانات
  function _removeCardAnimated(cardEl, afterCb) {
    if (!cardEl) { if (afterCb) afterCb(); return; }
    cardEl.style.transition  = 'all 0.35s ease';
    cardEl.style.transform   = 'scale(0.85)';
    cardEl.style.opacity     = '0';
    cardEl.style.maxWidth    = '0';
    cardEl.style.padding     = '0';
    cardEl.style.margin      = '0';
    cardEl.style.borderWidth = '0';
    cardEl.style.overflow    = 'hidden';
    setTimeout(function() {
      cardEl.remove();
      if (afterCb) afterCb();
    }, 380);
  }

  try {
    // ⑥ Rate limit check
    if (typeof _rlCheck === 'function') {
      var rlRes = _rlCheck();
      if (!rlRes.ok) { showError(rlRes.msg); _restoreAll(); return; }
    }

    // ⑦ التحقق الفعلي عبر Auth.login
    var result = await Auth.login(acc.username, acc.password);

    if (result.ok) {
      // ✅ النجاح: أظهر علامة ✅ على البطاقة ثم أعد التوجيه
      if (clickedCard) {
        clickedCard.innerHTML =
          '<div style="display:flex;align-items:center;gap:8px;width:100%;justify-content:center;padding:4px 0">' +
            '<span style="font-size:1.1rem">✅</span>' +
            '<span style="font-size:0.78rem;font-weight:700;color:#38a169">تم التحقق</span>' +
          '</div>';
        clickedCard.style.borderColor = 'rgba(56,161,105,0.6)';
        clickedCard.style.background  = 'rgba(56,161,105,0.1)';
      }
      if (btn) btn.innerHTML = '✅ جاري الدخول...';
      _saAdd(result.user);
      setTimeout(function() { redirectUser(result.user); }, 400);

    } else {
      var msg = result.msg || '';

      // ── تصنيف نوع الخطأ ──
      var isDeleted   = msg.indexOf('حذف') !== -1 || msg.indexOf('غير موجود') !== -1;
      var isPwChanged = msg.indexOf('كلمة المرور') !== -1 || msg.indexOf('غير صحيحة') !== -1;
      var isNetwork   = msg.indexOf('تعذّر') !== -1 || msg.indexOf('الاتصال') !== -1;

      if (isDeleted) {
        // 🗑️ الحساب محذوف نهائياً → احذف البطاقة تلقائياً بأنيماشن حمراء
        if (clickedCard) {
          clickedCard.innerHTML =
            '<div style="display:flex;align-items:center;gap:8px;width:100%;justify-content:center;padding:4px 0">' +
              '<span style="font-size:1rem">⛔</span>' +
              '<span style="font-size:0.74rem;font-weight:700;color:#e53e3e">تم حذف الحساب</span>' +
            '</div>';
          clickedCard.style.borderColor = 'rgba(229,62,62,0.6)';
          clickedCard.style.background  = 'rgba(229,62,62,0.08)';
        }
        showError(msg);
        allCards.forEach(function(c) { if (c !== clickedCard) { c.style.opacity = ''; c.style.pointerEvents = ''; } });
        if (btn) { btn.disabled = false; btn.innerHTML = '<span>الدخول</span><span>🚀</span>'; }
        setTimeout(function() {
          _saDelete(acc.id); // يحذف من القائمة ويُعيد الرسم
        }, 900);

      } else if (isPwChanged) {
        // 🔑 كلمة المرور تغيّرت → احذف البيانات القديمة وأطلب إعادة الإدخال
        if (clickedCard) {
          clickedCard.innerHTML =
            '<div style="display:flex;align-items:center;gap:8px;width:100%;justify-content:center;padding:4px 0">' +
              '<span style="font-size:1rem">🔑</span>' +
              '<span style="font-size:0.72rem;font-weight:700;color:#dd6b20">كلمة المرور تغيّرت</span>' +
            '</div>';
          clickedCard.style.borderColor = 'rgba(221,107,32,0.6)';
          clickedCard.style.background  = 'rgba(221,107,32,0.08)';
        }
        showError('🔑 كلمة مرور "' + _escHtml(acc.name) + '" تغيّرت — يرجى تسجيل الدخول يدوياً');
        allCards.forEach(function(c) { if (c !== clickedCard) { c.style.opacity = ''; c.style.pointerEvents = ''; } });
        if (btn) { btn.disabled = false; btn.innerHTML = '<span>الدخول</span><span>🚀</span>'; }
        // احذف كلمة المرور القديمة من القائمة وابق بالاسم فقط
        var list = _saLoad();
        list = list.map(function(a) { return a.id === acc.id ? Object.assign({}, a, {password: ''}) : a; });
        _saSave(list);
        // ملء الحقل تلقائياً
        var usrF = document.getElementById('username');
        var pwdF = document.getElementById('password');
        if (usrF) usrF.value = acc.username;
        if (pwdF) { pwdF.value = ''; setTimeout(function() { pwdF.focus(); }, 500); }
        setTimeout(function() { _saRender(); }, 900);

      } else if (isNetwork) {
        // 🌐 خطأ شبكة مؤقت → أبقِ البطاقة كما هي
        showError(msg);
        _restoreAll();

      } else {
        // ❓ خطأ غير محدد
        showError(msg || 'فشل التحقق — حاول مجدداً');
        _restoreAll();
      }
    }

  } catch(err) {
    _restoreAll();
    showError('حدث خطأ، تحقق من اتصالك بالإنترنت.');
  }
}

async function handleLogin() {
  const username = document.getElementById('username')?.value.trim();
  const password = document.getElementById('password')?.value.trim();
  
  hideError();
  if (!username || !password) { showError('يرجى إدخال اسم المستخدم وكلمة المرور'); return; }

  // ── فحص Rate Limiting (يُشغَّل عبر supabase-client.js) ──
  if (typeof _rlCheck === 'function') {
    const rlRes = _rlCheck();
    if (!rlRes.ok) { showError(rlRes.msg); return; }
  }
  
  const btn = document.getElementById('loginBtn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-loader" style="display:inline-block;vertical-align:middle;margin-left:6px"></span><span style="vertical-align:middle"> جاري التحقق...</span>';
  }
  
  try {
    const result = await Auth.login(username, password);
    if (result.ok) {
      localStorage.setItem('ghars__saved_creds', JSON.stringify({username: result.user.username, id: result.user.id, role: result.user.role}));
      _saAdd(result.user);
      if (btn) btn.innerHTML = '✅ جاري الدخول...';
      redirectUser(result.user);
    } else {
      if (btn) { btn.disabled = false; btn.innerHTML = '<span>الدخول</span><span>🚀</span>'; }
      showError(result.msg || 'اسم المستخدم أو كلمة المرور غير صحيحة');
      const card = document.querySelector('.login-card');
      if (card) { card.style.animation = 'none'; void card.offsetWidth; card.style.animation = 'shake 0.4s ease'; }
    }
  } catch(err) {
    if (btn) { btn.disabled = false; btn.innerHTML = '<span>الدخول</span><span>🚀</span>'; }
    showError('حدث خطأ، تحقق من اتصالك بالإنترنت.');
  }
}

function showQRLoginSuccess(user, username, password) {
  const card = document.querySelector('.login-card');
  if (card) {
    card.innerHTML = `
      <div style="text-align:center;padding:10px 0 20px">
        <div style="font-size:3rem;margin-bottom:12px">✅</div>
        <div style="font-size:1.1rem;font-weight:900;color:#0a1628;margin-bottom:8px">تم الدخول بنجاح!</div>
        <div style="font-size:0.82rem;color:#666;margin-bottom:20px">مرحباً <strong style="color:#c9a227">${user.name}</strong></div>
        <div style="background:#f8fafc;border-radius:12px;padding:14px;text-align:right;margin-bottom:16px;border:1px solid #e2e8f0">
          <div style="font-size:0.78rem;color:#888;margin-bottom:8px;text-align:center">بيانات الدخول الخاصة بك</div>
          <div style="font-size:0.88rem;font-weight:700;color:#0a1628;margin-bottom:4px">👤 المستخدم: <code style="background:#e2e8f0;padding:2px 8px;border-radius:6px">${_escHtml(username)}</code></div>
          <div style="font-size:0.88rem;font-weight:700;color:#0a1628">🔑 المرور: <code style="background:#e2e8f0;padding:2px 8px;border-radius:6px">${_escHtml(password)}</code></div>
        </div>
        <div style="font-size:0.8rem;color:#888">سيتم توجيهك تلقائياً...</div>
        <div style="width:100%;height:4px;background:#e2e8f0;border-radius:2px;margin-top:14px;overflow:hidden">
          <div id="qrProgressBar" style="height:100%;background:linear-gradient(90deg,#c9a227,#a07d10);width:0%;transition:width 2s linear;border-radius:2px"></div>
        </div>
      </div>`;
    setTimeout(() => {
      const pb = document.getElementById('qrProgressBar');
      if (pb) pb.style.width = '100%';
    }, 50);
  }
  Auth._save(user).catch(() => {});
  setTimeout(() => redirectUser(user), 2200);
}

async function verifyAndRedirect(user) {
  function _blockUser(msg) {
    if (typeof _addToDeletedList === 'function') _addToDeletedList(user.id);
    try { localStorage.removeItem('ghars__session'); } catch(_) {}
    try { localStorage.removeItem('ghars__saved_creds'); } catch(_) {}
    try { localStorage.removeItem('ghars__users__' + user.id); } catch(_) {}
    if (typeof GharsDataDB !== 'undefined') GharsDataDB.del('ghars__users__' + user.id).catch(function(){});
    Auth.currentUser = null;
    showError(msg || '⛔ هذا الحساب تم حذفه ولا يمكن الدخول.');
  }

  // 1. فحص القائمة السوداء المحلية أولاً
  if (typeof _isDeleted === 'function' && _isDeleted(user.id)) {
    _blockUser('⛔ هذا الحساب تم حذفه من النظام نهائياً ولا يمكن الدخول.');
    return;
  }

  // 2. إذا كان Supabase مُهيّأً → التحقق الإلزامي القاطع (Strict Mode)
  if (typeof SUPABASE_URL !== 'undefined' && SUPABASE_URL.startsWith('https://')) {
    // إذا مكتبة Supabase لم تُحمّل إطلاقاً
    if (typeof _sb === 'undefined' || !_sb) {
      _blockUser('⚠️ تعذر تحميل نظام الحماية — يرجى التحقق من اتصالك وإيقاف مانع الإعلانات.');
      return;
    }

    // انتظار الاتصال (حتى 12 ثانية)
    if (!_sbOK) {
      await new Promise(function(res) {
        if (_sbOK) { res(); return; }
        var done = false;
        var timer = setTimeout(function() { if (!done) { done = true; res(); } }, 12000);
        window.addEventListener('ghars:connected', function _onC() {
          if (!done) { done = true; clearTimeout(timer); window.removeEventListener('ghars:connected', _onC); res(); }
        });
      });
    }

    // إذا لم يتصل بعد الانتظار → حاول ping مباشر
    if (!_sbOK && typeof _sb !== 'undefined' && _sb) {
      try {
        var _vPing = await _sb.from('ghars_data').select('collection',{count:'exact',head:true});
        if (!_vPing.error) _sbOK = true;
      } catch(_) {}
    }

    if (!_sbOK) {
      _blockUser('⚠️ تعذّر الاتصال بالخادم — تحقق من الإنترنت وحاول مجدداً.');
      return;
    }

    // التحقق المباشر من قاعدة البيانات
    try {
      const [delCheck, userCheck] = await Promise.all([
        _sb.from('ghars_data').select('doc_id').eq('collection','deleted_accounts').eq('doc_id',user.id).maybeSingle(),
        _sb.from('ghars_data').select('data').eq('collection','users').eq('doc_id',user.id).maybeSingle()
      ]);

      // أي خطأ في استعلام قاعدة البيانات يعني رفض الدخول لحماية النظام
      if (delCheck && delCheck.error) { _blockUser('⚠️ تعذر التحقق من الحساب — تحقق من الاتصال.'); return; }
      if (userCheck && userCheck.error) { _blockUser('⚠️ تعذر التحقق من الحساب — تحقق من الاتصال.'); return; }

      // موجود في قائمة المحذوفين؟
      if (delCheck && delCheck.data) {
        _blockUser('⛔ هذا الحساب تم حذفه نهائياً ولا يمكن الدخول.');
        return;
      }

      // غير موجود في قاعدة البيانات؟ (تم مسح السجل)
      if (userCheck && !userCheck.data) {
        _blockUser('⛔ هذا الحساب غير موجود في النظام ولا يمكن الدخول.');
        return;
      }

      // موجود لكن يحمل علامة الحذف أو التعطيل؟
      if (userCheck && userCheck.data && userCheck.data.data) {
        const ud = userCheck.data.data;
        if (ud.deleted || ud.purged || ud.qrInvalidated || ud.password === '__REVOKED__') {
          _blockUser('⛔ هذا الحساب تم تعطيله ولا يمكن الدخول.');
          return;
        }
      }
    } catch(e) {
      _blockUser('⚠️ تعذر التحقق من الحساب — تحقق من الاتصال وحاول مجدداً.');
      return;
    }
  }

  // 3. الحساب مؤكد وسليم 100% → أعد التوجيه
  redirectUser(user);
}

function redirectUser(user) {
  // إظهار شريط التقدم
  _startTopBar();
  // إظهار شاشة الانتقال المتحركة
  const ov = document.getElementById('ghars-redirect-overlay');
  if (ov) {
    const msg = ov.querySelector('.gr-msg');
    if (msg) msg.textContent = user.role === 'student' ? 'جاري الدخول كطالب...' : user.role === 'admin' ? 'جاري الدخول كمدير...' : 'جاري الدخول كمعلم...';
    ov.classList.add('show');
  }
  setTimeout(function() {
    if (user.role === 'student') window.location.href = 'student.html';
    else window.location.href = 'teacher.html';
  }, 900);
}

function _startTopBar() {
  var bar = document.getElementById('ghars-topbar');
  if (!bar) return;
  bar.classList.remove('done');
  bar.style.opacity = '1';
  bar.style.width = '0%';
  clearInterval(bar._timer);
  var steps = [15, 35, 55, 72, 88];
  var idx = 0;
  bar._timer = setInterval(function() {
    if (idx < steps.length) { bar.style.width = steps[idx] + '%'; idx++; }
    else clearInterval(bar._timer);
  }, 90);
}

function _escHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function showError(msg) {
  const errBox = document.getElementById('errorMsg');
  const errTxt = document.getElementById('errorText');
  if(errBox && errTxt) { errBox.style.display = 'flex'; errTxt.textContent = msg; }
}

function hideError() {
  const errBox = document.getElementById('errorMsg');
  if(errBox) errBox.style.display = 'none';
}
</script>
